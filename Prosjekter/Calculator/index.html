<!DOCTYPE html>
<html>
<head>
	<title>Calculator</title>
	<link rel="stylesheet" type="text/css" href="style.css">
	<script type="text/javascript" src="script.js"></script>
</head>
<body>
	<h1>Calculator!</h1>

	<div>
		<div id="display">
			<input type="text" value="0" id="displayField" readonly="true">
		</div>
		<div>
			<button type="button" onclick="addNumb(7)">7</button>
			<button type="button" onclick="addNumb(8)">8</button>
			<button type="button" onclick="addNumb(9)">9</button><br>
			<button type="button" onclick="addNumb(4)">4</button>
			<button type="button" onclick="addNumb(5)">5</button>
			<button type="button" onclick="addNumb(6)">6</button><br>
			<button type="button" onclick="addNumb(1)">1</button>
			<button type="button" onclick="addNumb(2)">2</button>
			<button type="button" onclick="addNumb(3)">3</button><br>
			<!-- <button type="button" onclick="addNumb(+)">+</button>
			<button type="button" onclick="addNumb(-)">-</button><br> -->

			<button type="button" onclick="calculate()" id="calculate">=</button>
		</div>
	</div>
</body>
</html>
